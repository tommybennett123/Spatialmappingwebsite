<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-labelledby="title desc">
  <title>Intuition Spatial logo</title>
  <desc>Hexagon made of six colored spatial segments</desc>
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7" />
      <stop offset="100%" stop-color="#FDE68A" />
    </linearGradient>
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FECACA" />
      <stop offset="100%" stop-color="#FCA5A5" />
    </linearGradient>
  </defs>
  <g transform="translate(20 20)">
    <path d="M130 0 L250 75 L250 185 L130 260 L10 185 L10 75 Z" fill="none" stroke="#111827" stroke-width="12" />
    <path d="M130 0 L250 75 L130 150 L10 75 Z" fill="url(#gradB)" />
    <path d="M130 0 L130 150 L10 75 Z" fill="#A7F3D0" />
    <path d="M130 0 L250 75 L130 150 Z" fill="#93C5FD" opacity="0.95" />
    <path d="M10 75 L130 150 L130 260 L10 185 Z" fill="url(#gradA)" />
